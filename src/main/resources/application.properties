spring.application.name=discord-mcp
server.port=${PORT:8085}

spring.ai.mcp.server.name=discord-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.stdio=true

# Default mode (backward compatible): stdio transport.
spring.main.web-application-type=none
spring.main.banner-mode=off

# Logging is configured in logback-spring.xml to keep stdout clean in stdio mode.

logging.file.name=./target/logs/discord-mcp-server.log
